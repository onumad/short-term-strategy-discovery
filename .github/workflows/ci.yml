name: research-foundation-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-hermetic:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.lock.txt

      - name: Install locked tooling environment
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install -r requirements-dev.lock.txt

      - name: Run hermetic verification
        run: python scripts/verify_project.py --profile quick
